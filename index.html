<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>THE RATTLESNAKE 10K CERTIFICATE</title>

<style>
body{
  background:#111;
  color:#fff;
  font-family:Arial, sans-serif;
  text-align:center;
  padding:20px;
}

h1{
  font-size:32px;
  font-weight:900;
  margin-bottom:20px;
  letter-spacing:1px;
}

input{
  padding:14px;
  font-size:18px;
  width:90%;
  max-width:520px;
  border-radius:10px;
  border:none;
  margin-bottom:12px;
}

button{
  display:block;
  width:90%;
  max-width:520px;
  margin:10px auto;
  padding:16px;
  font-size:20px;
  font-weight:800;
  border-radius:14px;
  border:none;
  background:#f39c12;
  color:#000;
  cursor:pointer;
}

button:disabled{ opacity:0.5; cursor:not-allowed; }

#status{
  margin-top:14px;
  font-size:14px;
  opacity:0.85;
}

canvas{
  margin-top:20px;
  border:4px solid #f39c12;
  border-radius:18px;
  max-width:100%;
  height:auto;
  background:#222;
}
</style>
</head>

<body>

<h1>THE RATTLESNAKE 10K CERTIFICATE</h1>

<input id="nameInput" type="text" placeholder="Enter your name" />

<button id="generateBtn">Generate Certificate</button>
<button id="downloadBtn" disabled>Download Certificate</button>

<div id="status">Loading certificate image…</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const nameInput = document.getElementById("nameInput");
const generateBtn = document.getElementById("generateBtn");
const downloadBtn = document.getElementById("downloadBtn");
const status = document.getElementById("status");

const certImage = new Image();
certImage.src = "certificate.png";

let imageLoaded = false;
let hasGenerated = false;

certImage.onload = () => {
  imageLoaded = true;
  canvas.width = certImage.naturalWidth;
  canvas.height = certImage.naturalHeight;
  ctx.drawImage(certImage, 0, 0);
  status.textContent = "Ready. Enter your name and press Generate.";
};

certImage.onerror = () => {
  status.textContent = "ERROR: certificate.png failed to load.";
};

/* ---------- HELPERS ---------- */
function setImpact(sizePx){
  ctx.font = `900 ${Math.round(sizePx)}px Impact`;
}
function textW(text){
  return ctx.measureText(text).width;
}

/* ---------- NAME (FIXED PER YOUR NOTES) ----------
   - Always ONE LINE
   - Always CENTRED
   - Auto shrink for long names
   - Tiny move UP
--------------------------------------------------- */
function drawName(name){
  const upperName = String(name).toUpperCase().replace(/\s+/g," ").trim();

  // TRUE centre of certificate (fixes "not central")
  const x = canvas.width / 2;

  // Tiny move UP (few pixels)
  const y = canvas.height * 0.648;

  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  // Style
  ctx.fillStyle = "#F5F5F5";
  ctx.shadowColor = "rgba(0,0,0,0.45)";
  ctx.shadowBlur = 7;
  ctx.shadowOffsetX = 3;
  ctx.shadowOffsetY = 3;

  // Max width: keep inside the name band so it doesn't smash fox/edges
  // (still centred — we just force the font to shrink to fit this width)
  const maxWidth = canvas.width * 0.78;

  // Start size slightly smaller than before (fixes "too big")
  let size = canvas.width * 0.082;

  // Minimum size so even very long names still appear (but small)
  const minSize = canvas.width * 0.040;

  // Fit loop (single line always)
  setImpact(size);
  while (textW(upperName) > maxWidth && size > minSize){
    size -= 2;
    setImpact(size);
  }

  ctx.fillText(upperName, x, y);

  ctx.shadowColor = "transparent";
}

/* ---------- DATE (UNCHANGED) ---------- */
function drawDate(){
  const today = new Date();
  const dateString = today.toLocaleDateString("en-GB",{
    day:"2-digit",
    month:"short",
    year:"numeric"
  });

  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  const fontSize = Math.max(14, Math.round(canvas.width * 0.016));
  ctx.font = `700 ${fontSize}px Arial`;
  ctx.fillStyle = "#ffffff";

  ctx.shadowColor = "rgba(0,0,0,0.35)";
  ctx.shadowBlur = 4;
  ctx.shadowOffsetX = 2;
  ctx.shadowOffsetY = 2;

  const x = canvas.width / 2;
  const y = canvas.height * 0.922; // untouched
  ctx.fillText(dateString, x, y);

  ctx.shadowColor = "transparent";
}

/* ---------- GENERATE / DOWNLOAD ---------- */
function generateCertificate(){
  if(!imageLoaded){
    status.textContent = "Still loading certificate image…";
    return;
  }

  const name = nameInput.value.trim();
  if(!name){
    status.textContent = "Enter your name first.";
    return;
  }

  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(certImage,0,0);

  drawName(name);
  drawDate();

  hasGenerated = true;
  downloadBtn.disabled = false;
  status.textContent = "Certificate generated. Ready to download.";
}

function downloadCertificate(){
  if(!hasGenerated){
    status.textContent = "Generate the certificate first.";
    return;
  }

  const link = document.createElement("a");
  link.download = "WRW_Rattlesnake_10K_Certificate.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
}

generateBtn.addEventListener("click", generateCertificate);
downloadBtn.addEventListener("click", downloadCertificate);
</script>

</body>
</html>
