<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WRW Rattlesnake 10K Certificate</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
  --wrw-green:#048d64;
  --wrw-green-dark:#036c4b;
  --wrw-green-light:#0ab17e;
  --panel-width: 720px;
  --control-width: 420px;
  --radius: 18px;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#0b0b0d;
  color:#fff;
  font-family:Arial, sans-serif;
  text-align:center;
  padding:28px 16px 36px;
}

.page{
  width:100%;
  max-width:var(--panel-width);
  margin:0 auto;
}

h1{
  margin:0 0 14px 0;
  font-size:clamp(34px, 7vw, 62px);
  line-height:0.95;
  font-weight:900;
  letter-spacing:0.5px;
  text-transform:uppercase;
}

.subLine{
  margin:0 auto 14px auto;
  max-width:640px;
  opacity:0.94;
  font-size:14px;
  line-height:1.45;
}

.siteLink{
  margin-top:12px;
}

.siteLink a{
  display:block;
  width:100%;
  max-width:var(--control-width);
  margin:0 auto;
  padding:16px 18px;
  border-radius:var(--radius);
  font-size:14px;
  font-weight:900;
  letter-spacing:1.8px;
  text-transform:uppercase;
  color:#ffffff;
  text-decoration:none;
  background:linear-gradient(135deg, var(--wrw-green-dark), var(--wrw-green), var(--wrw-green-light));
  border:1px solid rgba(4,141,100,.6);
  box-shadow:
    0 12px 26px rgba(0,0,0,.55),
    0 0 18px rgba(4,141,100,.25);
}

input{
  width:100%;
  max-width:var(--control-width);
  margin:16px auto 0;
  padding:16px 18px;
  font-size:18px;
  border-radius:var(--radius);
  border:none;
  display:block;
  outline:none;
}

.buttonRow{
  display:flex;
  gap:12px;
  width:100%;
  max-width:var(--control-width);
  margin:14px auto 0;
}

.buttonRow button{
  flex:1;
  min-height:92px;
}

button{
  padding:14px;
  font-size:18px;
  border-radius:var(--radius);
  border:none;
  font-weight:900;
  cursor:pointer;
}

button:disabled{
  opacity:0.5;
  cursor:not-allowed;
}

.primaryBtn{
  background:var(--wrw-green);
  color:#fff;
}

.secondaryBtn{
  background:var(--wrw-green-dark);
  color:#fff;
}

.canvasWrap{
  width:100%;
  max-width:var(--panel-width);
  margin:26px auto 0;
}

canvas{
  display:block;
  width:100%;
  max-width:100%;
  height:auto;
  margin:0 auto;
  border:4px solid var(--wrw-green);
  background:#222;
}

.note{
  margin:20px auto 0;
  max-width:640px;
  font-size:13px;
  line-height:1.5;
  opacity:0.92;
}

.note a{
  color:var(--wrw-green);
  text-decoration:none;
  font-weight:700;
}

@media (max-width:560px){
  body{
    padding:20px 12px 28px;
  }

  h1{
    font-size:clamp(28px, 10vw, 48px);
    line-height:1.02;
    margin-bottom:12px;
  }

  .subLine{
    font-size:13px;
    margin-bottom:12px;
  }

  .siteLink a,
  input{
    max-width:100%;
  }

  .buttonRow{
    max-width:100%;
  }

  .buttonRow button{
    min-height:84px;
    font-size:17px;
  }
}
</style>
</head>

<body>

<div class="page">
  <h1>WRW RATTLESNAKE<br>10K CERTIFICATE</h1>

  <div class="subLine">
    Congrats on finishing the Rattlesnake 10K. Ready for your next challenge?
    <div class="siteLink">
      <a href="https://walkrunwrestle.com" target="_blank" rel="noopener">
        WALKRUNWRESTLE.COM
      </a>
    </div>
  </div>

  <input
    id="nameInput"
    type="text"
    placeholder="Enter your full name"
    autocomplete="name"
    autocapitalize="words"
    spellcheck="false"
  />

  <div class="buttonRow">
    <button id="generateBtn" class="primaryBtn">Create Certificate</button>
    <button id="downloadBtn" class="secondaryBtn" disabled>Download Certificate</button>
  </div>

  <div class="canvasWrap">
    <canvas id="canvas"></canvas>
  </div>

  <div class="note">
    If your name looks too long or spacing looks off, email
    <a href="mailto:contact@walkrunwrestle.com">contact@walkrunwrestle.com</a>
    and we’ll send a personalised version.
  </div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const nameInput = document.getElementById("nameInput");
const generateBtn = document.getElementById("generateBtn");
const downloadBtn = document.getElementById("downloadBtn");

const certImage = new Image();
certImage.src = "certificate.png";

let imageLoaded = false;
let hasGenerated = false;

certImage.onload = () => {
  imageLoaded = true;
  canvas.width = certImage.naturalWidth;
  canvas.height = certImage.naturalHeight;
  ctx.drawImage(certImage, 0, 0);
};

function redrawBase(){
  if (!imageLoaded) return;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(certImage,0,0);
}

function drawName(name){
  const upperName = name.toUpperCase();
  const centerX = canvas.width / 2;
  const nameY = (canvas.height * 0.625) + 18;

  let size = Math.round(canvas.width * 0.066);
  const maxWidth = canvas.width * 0.68;
  const minSize = Math.round(canvas.width * 0.03);

  function setFont(s){
    ctx.font = `900 ${s}px Impact, Arial Black, sans-serif`;
  }

  setFont(size);

  while (ctx.measureText(upperName).width > maxWidth && size > minSize){
    size -= 2;
    setFont(size);
  }

  ctx.fillStyle = "#f5f5f5";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  ctx.shadowColor = "rgba(0,0,0,0.45)";
  ctx.shadowBlur = 6;
  ctx.shadowOffsetX = 3;
  ctx.shadowOffsetY = 3;

  ctx.fillText(upperName, centerX, nameY);

  ctx.shadowColor = "transparent";
}

function drawDate(){
  const today = new Date();

  function getOrdinal(n){
    if (n > 3 && n < 21) return "th";
    switch(n % 10){
      case 1: return "st";
      case 2: return "nd";
      case 3: return "rd";
      default: return "th";
    }
  }

  const day = today.getDate();
  const month = today.toLocaleString("en-GB",{month:"long"});
  const year = today.getFullYear();

  const dateString = `${day}${getOrdinal(day)} ${month} ${year}`;

  ctx.font = "36px Arial";
  ctx.fillStyle = "#ffffff";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  const x = canvas.width / 2;
  const y = canvas.height * 0.89;

  ctx.fillText(dateString, x, y);
}

function generateCertificate(){
  if (!imageLoaded) return;

  const name = nameInput.value.trim();
  if (!name) return;

  redrawBase();
  drawName(name);
  drawDate();

  hasGenerated = true;
  downloadBtn.disabled = false;
}

function downloadCertificate(){
  if (!hasGenerated) return;

  const link = document.createElement("a");
  link.download = "WRW_RATTLESNAKE_10K_CERTIFICATE.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
}

generateBtn.addEventListener("click", generateCertificate);
downloadBtn.addEventListener("click", downloadCertificate);
</script>

</body>
</html>
