<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE RATTLESNAKE 10K CERTIFICATE</title>

<style>
body{
  margin:0;
  background:#000;
  font-family:Arial, sans-serif;
  color:white;
  text-align:center;
}

h1{
  margin-top:40px;
  font-size:28px;
  font-weight:700;
}

input{
  width:70%;
  padding:14px;
  border-radius:12px;
  border:none;
  font-size:18px;
  margin-top:20px;
}

button{
  display:block;
  width:70%;
  margin:20px auto;
  padding:16px;
  background:#f59e0b;
  border:none;
  border-radius:16px;
  font-weight:700;
  font-size:18px;
}

#status{
  opacity:0.7;
  margin-bottom:20px;
}

canvas{
  width:90%;
  max-width:1000px;
  border-radius:20px;
  border:4px solid #f59e0b;
}
</style>
</head>

<body>

<h1>THE RATTLESNAKE 10K CERTIFICATE</h1>

<input id="nameInput" placeholder="Enter your name">

<button onclick="generateCertificate()">Generate Certificate</button>
<button onclick="downloadCertificate()">Download Certificate</button>

<div id="status"></div>

<br>
<canvas id="certificateCanvas"></canvas>

<script>

const canvas = document.getElementById("certificateCanvas");
const ctx = canvas.getContext("2d");

const background = new Image();
background.src = "certificate-base.jpg"; // YOUR CERTIFICATE IMAGE FILE

background.onload = function(){
  canvas.width = background.width;
  canvas.height = background.height;
  ctx.drawImage(background,0,0);
}

function generateCertificate(){

  const name = document.getElementById("nameInput").value.trim();
  if(!name) return;

  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(background,0,0);

  const upperName = name.toUpperCase();

  // ===== NAME SETTINGS =====
  const centerX = canvas.width / 2;

  // DO NOT CHANGE THIS — placement locked
  const nameY = canvas.height * 0.625;

  // Smaller starting size so long names behave
  let size = canvas.width * 0.075;

  // More aggressive shrink width
  const maxWidth = canvas.width * 0.68;

  // Lower minimum so long names still fit
  const minSize = canvas.width * 0.03;

  function setFont(s){
    ctx.font = `bold ${s}px Impact, Arial Black, sans-serif`;
  }

  setFont(size);

  while(ctx.measureText(upperName).width > maxWidth && size > minSize){
    size -= 2;
    setFont(size);
  }

  ctx.fillStyle = "#E5E5E5";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  ctx.fillText(upperName, centerX, nameY);

  document.getElementById("status").innerText =
    "Certificate generated. Ready to download.";
}

function downloadCertificate(){
  const link = document.createElement("a");
  link.download = "WRW-RATTLESNAKE-10K-CERTIFICATE.png";
  link.href = canvas.toDataURL();
  link.click();
}

</script>

</body>
</html>
