<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>THE RATTLESNAKE 10K CERTIFICATE</title>

<style>
body{
  background:#111;
  color:#fff;
  font-family:Arial, sans-serif;
  text-align:center;
  padding:20px;
}

h1{
  font-size:32px;
  font-weight:900;
  margin-bottom:20px;
}

input{
  padding:14px;
  font-size:18px;
  width:90%;
  max-width:520px;
  border-radius:10px;
  border:none;
  margin-bottom:12px;
}

button{
  display:block;
  width:90%;
  max-width:520px;
  margin:10px auto;
  padding:16px;
  font-size:20px;
  font-weight:800;
  border-radius:14px;
  border:none;
  background:#f39c12;
  color:#000;
  cursor:pointer;
}

button:disabled{ opacity:0.5; cursor:not-allowed; }

#status{
  margin-top:14px;
  font-size:14px;
  opacity:0.85;
}

canvas{
  margin-top:20px;
  border:4px solid #f39c12;
  border-radius:18px;
  max-width:100%;
  height:auto;
  background:#222;
}
</style>
</head>

<body>

<h1>THE RATTLESNAKE 10K CERTIFICATE</h1>

<input id="nameInput" type="text" placeholder="Enter your name" />

<button id="generateBtn">Generate Certificate</button>
<button id="downloadBtn" disabled>Download Certificate</button>

<div id="status">Loading certificate image…</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const nameInput = document.getElementById("nameInput");
const generateBtn = document.getElementById("generateBtn");
const downloadBtn = document.getElementById("downloadBtn");
const status = document.getElementById("status");

const certImage = new Image();
certImage.src = "certificate.png"; // MUST match filename in repo

let imageLoaded = false;
let hasGenerated = false;

certImage.onload = () => {
  imageLoaded = true;
  canvas.width = certImage.naturalWidth;
  canvas.height = certImage.naturalHeight;
  ctx.drawImage(certImage, 0, 0);
  status.textContent = "Ready. Enter your name and press Generate.";
};

certImage.onerror = () => {
  status.textContent = "ERROR: certificate.png failed to load.";
};

/* ---------- TEXT HELPERS ---------- */
function measure(text, font){
  ctx.font = font;
  return ctx.measureText(text).width;
}

function splitToTwoLines(words){
  // Balanced split (best for 3-5 words names)
  if (words.length < 2) return [words.join(" ")];

  let best = null;
  for (let i = 1; i < words.length; i++){
    const a = words.slice(0,i).join(" ");
    const b = words.slice(i).join(" ");
    const diff = Math.abs(a.length - b.length);
    if (!best || diff < best.diff) best = { a, b, diff };
  }
  return [best.a, best.b];
}

function drawFittedLine(text, x, y, maxWidth, startPx, minPx){
  let fontSize = startPx;
  let font = `900 ${fontSize}px Impact`;

  while (measure(text, font) > maxWidth && fontSize > minPx){
    fontSize -= 2;
    font = `900 ${fontSize}px Impact`;
  }

  ctx.font = font;
  ctx.fillText(text, x, y);
  return fontSize;
}

/* ---------- DRAW NAME (FIXED FOR LONG NAMES) ---------- */
function drawName(name){
  const upperName = name.toUpperCase().replace(/\s+/g, " ").trim();

  // SAFE BOX: avoid fox on left + keep inside right border
  const safeLeft  = canvas.width * 0.20;  // push right of fox
  const safeRight = canvas.width * 0.94;  // keep inside frame
  const maxWidth  = safeRight - safeLeft;
  const x = (safeLeft + safeRight) / 2;

  // Base Y (your sweet spot)
  const baseY = canvas.height * 0.625;

  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  // Shadow (keep subtle)
  ctx.shadowColor = "rgba(0,0,0,0.5)";
  ctx.shadowBlur = 8;
  ctx.shadowOffsetX = 3;
  ctx.shadowOffsetY = 3;

  ctx.fillStyle = "#f5f5f5";

  // Start size
  const startPx = Math.round(canvas.width * 0.095);
  const minPx   = Math.round(canvas.width * 0.055);

  // Try single-line first
  const testFont = `900 ${startPx}px Impact`;
  const singleWidth = measure(upperName, testFont);

  if (singleWidth <= maxWidth){
    drawFittedLine(upperName, x, baseY, maxWidth, startPx, minPx);
  } else {
    // If too long, split to 2 lines and fit each
    const words = upperName.split(" ");
    const lines = splitToTwoLines(words);

    // Draw 2-line stacked name a touch lower spacing
    // so it stays inside that name area
    const lineGap = Math.round(canvas.width * 0.010);

    // Fit first line and use that as ref size
    const usedPx1 = drawFittedLine(lines[0], x, baseY - (startPx * 0.38), maxWidth, startPx, minPx);
    const usedPx2 = drawFittedLine(lines[1], x, baseY + (usedPx1 * 0.55) + lineGap, maxWidth, usedPx1, minPx);
  }

  ctx.shadowColor = "transparent";
}

/* ---------- DRAW DATE (BETTER BETWEEN LINES) ---------- */
function drawDate(){
  const today = new Date();
  const dateString = today.toLocaleDateString("en-GB",{
    day:"2-digit",
    month:"short",
    year:"numeric"
  });

  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  // Slightly smaller + moved up to sit between the two white lines
  const fontSize = Math.max(14, Math.round(canvas.width * 0.016));
  ctx.font = `700 ${fontSize}px Arial`;
  ctx.fillStyle = "#ffffff";

  ctx.shadowColor = "rgba(0,0,0,0.35)";
  ctx.shadowBlur = 4;
  ctx.shadowOffsetX = 2;
  ctx.shadowOffsetY = 2;

  const x = canvas.width / 2;
  const y = canvas.height * 0.922; // moved UP

  ctx.fillText(dateString, x, y);

  ctx.shadowColor = "transparent";
}

/* ---------- GENERATE / DOWNLOAD ---------- */
function generateCertificate(){
  if(!imageLoaded){
    status.textContent = "Still loading certificate image…";
    return;
  }

  const name = nameInput.value.trim();
  if(!name){
    status.textContent = "Enter your name first.";
    return;
  }

  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(certImage,0,0);

  drawName(name);
  drawDate();

  hasGenerated = true;
  downloadBtn.disabled = false;
  status.textContent = "Certificate generated. Ready to download.";
}

function downloadCertificate(){
  if(!hasGenerated){
    status.textContent = "Generate the certificate first.";
    return;
  }

  const link = document.createElement("a");
  link.download = "WRW_Rattlesnake_10K_Certificate.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
}

generateBtn.addEventListener("click", generateCertificate);
downloadBtn.addEventListener("click", downloadCertificate);
</script>

</body>
</html>
