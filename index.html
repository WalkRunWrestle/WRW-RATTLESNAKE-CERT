<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WRW Rattlesnake 10K Certificate</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  background: #111;
  color: #fff;
  font-family: Arial, sans-serif;
  text-align: center;
  padding: 20px;
}

h1 {
  margin-bottom: 10px;
}

.subLine{
  margin: 0 auto 14px auto;
  max-width: 720px;
  opacity: 0.92;
  font-size: 14px;
  line-height: 1.35;
}

/* CHANGED: link box smaller + centred (and name input matches exactly) */
:root{
  --topBoxMax: 560px;  /* smaller than before (was 720px) */
  --topBoxRadius: 14px;
}

.siteLink{
  margin-top: 10px;
}
.siteLink a{
  display:block;
  width:100%;
  max-width: var(--topBoxMax);
  margin: 0 auto;
  padding:14px 18px;
  border-radius: var(--topBoxRadius);
  font-size:14px;
  font-weight:900;
  letter-spacing:1.8px;
  text-transform:uppercase;
  color:#141418;
  text-decoration:none;
  background: linear-gradient(135deg, rgba(230,184,74,1), rgba(255,214,107,1), rgba(194,143,44,1));
  border:1px solid rgba(255,214,107,.95);
  box-shadow:
    0 12px 26px rgba(0,0,0,.55),
    0 0 18px rgba(230,184,74,.18);
}

/* CHANGED: name input matches link box size + centred */
input {
  width:100%;
  max-width: var(--topBoxMax);
  margin:14px auto;
  padding:14px 18px;
  font-size:18px;
  border-radius: var(--topBoxRadius);
  border:none;
  display:block;
}

.buttonRow{
  display:flex;
  gap:12px;
  max-width:560px;     /* keep button row aligned with the smaller boxes */
  margin:10px auto;
}
.buttonRow button{
  flex:1;
}

button {
  padding:14px;
  font-size:18px;
  border-radius:14px;
  border:none;
  font-weight:bold;
  cursor:pointer;
}

button:disabled {
  opacity:0.5;
  cursor:not-allowed;
}

.primaryBtn{
  background:#f39c12;
}

.secondaryBtn{
  background:#8a5b12;
  color:#111;
}

.clearBtn{
  width:100%;
  max-width:560px;
  margin:18px auto 0 auto;
  padding:14px;
  background:#222;
  border:2px solid #f39c12;
  color:#fff;
  border-radius:14px;
}

canvas {
  margin-top: 20px;
  border: 3px solid #f39c12;
  max-width: 100%;
  height: auto;
  background: #222;
}

.note{
  margin: 14px auto 0 auto;
  max-width: 720px;
  font-size: 13px;
  line-height: 1.35;
  opacity: 0.9;
}
.note a{
  color:#f39c12;
  text-decoration:none;
  font-weight:700;
}
</style>
</head>

<body>

<h1>WRW RATTLESNAKE 10K CERTIFICATE</h1>

<div class="subLine">
  Congrats on finishing the Rattlesnake 10K. Ready for your next challenge?
  <div class="siteLink">
    <a href="https://walkrunwrestle.com" target="_blank" rel="noopener">WALKRUNWRESTLE.COM</a>
  </div>
</div>

<input
  id="nameInput"
  type="text"
  placeholder="Enter your name"
  autocomplete="name"
  autocapitalize="words"
  spellcheck="false"
/>

<div class="buttonRow">
  <button id="generateBtn" class="primaryBtn">Generate</button>
  <button id="downloadBtn" class="secondaryBtn" disabled>Download</button>
</div>

<div id="status"></div>

<canvas id="canvas"></canvas>

<button id="clearBtn" class="clearBtn">Clear</button>

<div class="note">
  For some long names, formatting may vary slightly. If needed, contact us
  (<a href="mailto:contact@walkrunwrestle.com">contact@walkrunwrestle.com</a>)
  and we’ll issue a personalised version by email.
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const nameInput = document.getElementById("nameInput");
const generateBtn = document.getElementById("generateBtn");
const downloadBtn = document.getElementById("downloadBtn");
const clearBtn = document.getElementById("clearBtn");
const status = document.getElementById("status");

const certImage = new Image();
certImage.src = "certificate.png";

let imageLoaded = false;
let hasGenerated = false;

certImage.onload = () => {
  imageLoaded = true;
  canvas.width = certImage.naturalWidth;
  canvas.height = certImage.naturalHeight;
  ctx.drawImage(certImage, 0, 0);
};

function redrawBase(){
  if (!imageLoaded) return;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(certImage,0,0);
}

function drawName(name){
  const upperName = name.toUpperCase();
  const centerX = canvas.width / 2;

  // 🔒 placement unchanged
  const nameY = (canvas.height * 0.625) + 18;

  let size = Math.round(canvas.width * 0.066);
  const maxWidth = canvas.width * 0.68;
  const minSize = Math.round(canvas.width * 0.03);

  function setFont(s){
    ctx.font = `900 ${s}px Impact, Arial Black, sans-serif`;
  }

  setFont(size);

  while (ctx.measureText(upperName).width > maxWidth && size > minSize){
    size -= 2;
    setFont(size);
  }

  ctx.fillStyle = "#f5f5f5";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  ctx.shadowColor = "rgba(0,0,0,0.45)";
  ctx.shadowBlur = 6;
  ctx.shadowOffsetX = 3;
  ctx.shadowOffsetY = 3;

  ctx.fillText(upperName, centerX, nameY);

  ctx.shadowColor = "transparent";
}

function drawDate(){
  const today = new Date();

  function getOrdinal(n){
    if (n>3 && n<21) return "th";
    switch(n%10){
      case 1:return "st";
      case 2:return "nd";
      case 3:return "rd";
      default:return "th";
    }
  }

  const day = today.getDate();
  const month = today.toLocaleString("en-GB",{month:"long"});
  const year = today.getFullYear();

  const dateString = `${day}${getOrdinal(day)} ${month} ${year}`;

  ctx.font = "36px Arial";
  ctx.fillStyle = "#ffffff";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  // 🔒 placement unchanged
  const x = canvas.width / 2;
  const y = canvas.height * 0.89;

  ctx.fillText(dateString, x, y);
}

function generateCertificate(){
  if (!imageLoaded) return;

  const name = nameInput.value.trim();
  if (!name) return;

  redrawBase();
  drawName(name);
  drawDate();

  hasGenerated = true;
  downloadBtn.disabled = false;
}

function downloadCertificate(){
  if (!hasGenerated) return;

  const link = document.createElement("a");
  link.download = "WRW_RATTLESNAKE_10K_CERTIFICATE.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
}

function clearAll(){
  nameInput.value="";
  hasGenerated=false;
  downloadBtn.disabled=true;
  redrawBase();
}

generateBtn.addEventListener("click", generateCertificate);
downloadBtn.addEventListener("click", downloadCertificate);
clearBtn.addEventListener("click", clearAll);
</script>

</body>
</html>
