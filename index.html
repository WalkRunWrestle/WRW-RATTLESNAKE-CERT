<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>THE RATTLESNAKE 10K CERTIFICATE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      background: #111;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
    }

    h1 {
      margin: 10px 0 18px;
      font-size: 44px;
      line-height: 1.05;
      letter-spacing: 1px;
      font-weight: 900;
      text-transform: uppercase;
    }

    input, button {
      padding: 14px;
      font-size: 18px;
      margin: 8px 6px;
      border-radius: 10px;
      border: none;
      width: min(560px, 92vw);
      max-width: 92vw;
      box-sizing: border-box;
    }

    input{
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btnRow{
      display: grid;
      gap: 10px;
      justify-content: center;
      margin-top: 6px;
    }

    button {
      background: #f39c12;
      font-weight: 900;
      cursor: pointer;
      width: min(560px, 92vw);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    canvas {
      margin-top: 18px;
      border: 3px solid #f39c12;
      max-width: 100%;
      height: auto;
      background: #222;
      border-radius: 6px;
    }

    #status {
      margin-top: 12px;
      font-size: 14px;
      opacity: 0.9;
    }
  </style>
</head>

<body>

  <h1>THE<br>RATTLESNAKE 10K<br>CERTIFICATE</h1>

  <input id="nameInput" type="text" placeholder="ENTER YOUR NAME" />

  <div class="btnRow">
    <button id="generateBtn">Generate Certificate</button>
    <button id="downloadBtn" disabled>Download Certificate</button>
  </div>

  <div id="status">Loading certificate image…</div>

  <canvas id="canvas"></canvas>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const nameInput = document.getElementById("nameInput");
    const generateBtn = document.getElementById("generateBtn");
    const downloadBtn = document.getElementById("downloadBtn");
    const status = document.getElementById("status");

    const certImage = new Image();
    certImage.src = "certificate.png"; // MUST match filename in repo

    let imageLoaded = false;
    let hasGenerated = false;

    nameInput.addEventListener("input", () => {
      nameInput.value = nameInput.value
        .toUpperCase()
        .replace(/\s+/g, " ");
    });

    nameInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        generateCertificate();
      }
    });

    certImage.onload = () => {
      imageLoaded = true;
      canvas.width = certImage.naturalWidth;
      canvas.height = certImage.naturalHeight;
      ctx.drawImage(certImage, 0, 0);
      status.textContent = "Ready. Enter your name and press Generate.";
    };

    certImage.onerror = () => {
      status.textContent = "ERROR: certificate.png failed to load.";
    };

    function clearAndRedrawBase(){
      ctx.setTransform(1,0,0,1,0,0);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(certImage, 0, 0);
    }

    function sanitizeName(raw){
      return String(raw || "")
        .trim()
        .replace(/\s+/g, " ")
        .toUpperCase();
    }

    function fitTextToBox(text, boxW, boxH, startPx, minPx, fontStack){
      let size = startPx;
      while (size >= minPx){
        ctx.font = `900 ${size}px ${fontStack}`;
        const m = ctx.measureText(text);

        const textH = (m.actualBoundingBoxAscent && m.actualBoundingBoxDescent)
          ? (m.actualBoundingBoxAscent + m.actualBoundingBoxDescent)
          : size;

        const textW = m.width;

        if (textW <= boxW && textH <= boxH) return size;
        size -= 2;
      }
      return minPx;
    }

    function drawName(name) {
      const upperName = sanitizeName(name);

      // ✅ MOVED DOWN + MADE SLIGHTLY SHORTER
      // If you want it even lower later: change 0.600 -> 0.610
      const box = {
        x: canvas.width * 0.20,
        y: canvas.height * 0.600,   // <-- moved DOWN (was 0.545/0.585 area)
        w: canvas.width * 0.60,
        h: canvas.height * 0.085    // <-- shorter height = forces smaller text
      };

      const x = box.x + (box.w / 2);
      const y = box.y + (box.h / 2);

      const fontStack = `"Arial Black", "Helvetica Neue", Arial, sans-serif`;

      // ✅ START SMALLER + ALLOW SMALLER MIN
      const startSize = Math.round(canvas.width * 0.075); // smaller start (was 0.10)
      const minSize = 28; // allow smaller (was 42)

      const finalSize = fitTextToBox(upperName, box.w, box.h, startSize, minSize, fontStack);

      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = `900 ${finalSize}px ${fontStack}`;

      // Cleaner shadow
      ctx.shadowColor = "rgba(0,0,0,0.55)";
      ctx.shadowBlur = 9;
      ctx.shadowOffsetX = 2;
      ctx.shadowOffsetY = 3;

      // ✅ THINNER OUTLINE (less chunky)
      ctx.lineJoin = "round";
      ctx.miterLimit = 2;

      ctx.lineWidth = Math.max(2, Math.round(finalSize * 0.055));
      ctx.strokeStyle = "rgba(0,0,0,0.80)";
      ctx.strokeText(upperName, x, y);

      ctx.fillStyle = "#F5F5F5";
      ctx.fillText(upperName, x, y);

      ctx.shadowColor = "transparent";
      ctx.shadowBlur = 0;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = 0;
    }

    function drawDate() {
      const today = new Date();
      const dateString = today.toLocaleDateString("en-GB", {
        day: "numeric",
        month: "short",
        year: "numeric"
      });

      const x = canvas.width / 2;
      const y = canvas.height * 0.92;

      const size = Math.max(26, Math.round(canvas.width * 0.030));
      ctx.font = `800 ${size}px Arial, sans-serif`;
      ctx.fillStyle = "#FFFFFF";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      ctx.shadowColor = "rgba(0,0,0,0.45)";
      ctx.shadowBlur = 6;
      ctx.shadowOffsetX = 2;
      ctx.shadowOffsetY = 2;

      ctx.lineWidth = 3;
      ctx.strokeStyle = "rgba(0,0,0,0.75)";
      ctx.strokeText(dateString, x, y);
      ctx.fillText(dateString, x, y);

      ctx.shadowColor = "transparent";
    }

    function generateCertificate() {
      if (!imageLoaded) {
        status.textContent = "Still loading certificate image…";
        return;
      }

      const name = sanitizeName(nameInput.value);
      if (!name) {
        status.textContent = "Enter your name first.";
        return;
      }

      clearAndRedrawBase();
      drawName(name);
      drawDate();

      hasGenerated = true;
      downloadBtn.disabled = false;
      status.textContent = "Certificate generated. Ready to download.";
    }

    function downloadCertificate() {
      if (!hasGenerated) {
        status.textContent = "Generate the certificate first.";
        return;
      }

      const link = document.createElement("a");
      link.download = "WRW_RATTLESNAKE_10K_CERTIFICATE.png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    }

    generateBtn.addEventListener("click", generateCertificate);
    downloadBtn.addEventListener("click", downloadCertificate);
  </script>

</body>
</html>
