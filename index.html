<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>THE RATTLESNAKE 10K CERTIFICATE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      background: #111;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
      margin: 0;
    }

    h1 {
      margin: 18px 0 12px;
      font-size: 34px;
      font-weight: 900;
      letter-spacing: 1px;
      text-transform: uppercase;
      line-height: 1.1;
    }

    /* Better for phones: full width but capped */
    .wrap {
      width: min(520px, 92vw);
      margin: 0 auto;
    }

    input, button {
      padding: 14px;
      font-size: 18px;
      margin: 8px 0;
      border-radius: 14px;
      border: none;
      width: 100%;
      box-sizing: border-box;
    }

    input {
      background: #f2f2f2;
      color: #111;
    }

    button {
      background: #f39c12;
      font-weight: 900;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    canvas {
      margin-top: 18px;
      border: 3px solid #f39c12;
      max-width: 100%;
      height: auto;
      background: #222;
      border-radius: 18px;
    }

    #status {
      margin-top: 10px;
      font-size: 14px;
      opacity: 0.9;
    }
  </style>
</head>

<body>

  <div class="wrap">
    <h1>THE RATTLESNAKE 10K CERTIFICATE</h1>

    <input id="nameInput" type="text" placeholder="Enter your name" />

    <button id="generateBtn">Generate Certificate</button>
    <button id="downloadBtn" disabled>Download Certificate</button>

    <div id="status">Loading certificate image…</div>
  </div>

  <canvas id="canvas"></canvas>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const nameInput = document.getElementById("nameInput");
    const generateBtn = document.getElementById("generateBtn");
    const downloadBtn = document.getElementById("downloadBtn");
    const status = document.getElementById("status");

    const certImage = new Image();
    certImage.src = "certificate.png";   // MUST match filename in repo

    let imageLoaded = false;
    let hasGenerated = false;

    certImage.onload = () => {
      imageLoaded = true;
      canvas.width = certImage.naturalWidth;
      canvas.height = certImage.naturalHeight;
      ctx.drawImage(certImage, 0, 0);
      status.textContent = "Ready. Enter your name and press Generate.";
    };

    certImage.onerror = () => {
      status.textContent = "ERROR: certificate.png failed to load.";
    };

    // --- helper: shrink-to-fit single-line text ---
    function drawFitTextSingleLine(text, x, y, maxWidth, startSize, minSize) {
      let size = startSize;

      // Always single line; shrink font until it fits
      while (size > minSize) {
        ctx.font = `900 ${size}px Impact, Arial Black, sans-serif`;
        const w = ctx.measureText(text).width;
        if (w <= maxWidth) break;
        size -= 2;
      }

      ctx.fillText(text, x, y);
    }

    function drawName(name) {
      const upperName = name.toUpperCase();

      // Centering
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      // Style
      ctx.fillStyle = "#f5f5f5";

      // Shadow (keep it subtle)
      ctx.shadowColor = "rgba(0,0,0,0.45)";
      ctx.shadowBlur = 6;
      ctx.shadowOffsetX = 3;
      ctx.shadowOffsetY = 3;

      const x = canvas.width / 2;

      // ✅ LOCKED placement you said was perfect
      const y = canvas.height * 0.625;

      // ✅ Fit rules (this is the real fix)
      const maxWidth = canvas.width * 0.72; // safe zone between fox + right edge
      const startSize = Math.round(canvas.width * 0.078); // slightly smaller default than before
      const minSize = Math.round(canvas.width * 0.034);   // allows long names to still fit

      drawFitTextSingleLine(upperName, x, y, maxWidth, startSize, minSize);

      // Reset shadow
      ctx.shadowColor = "transparent";
      ctx.shadowBlur = 0;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = 0;
    }

    function drawDate() {
      // ✅ DO NOT TOUCH DATE (kept exactly as your original)
      const today = new Date();
      const dateString = today.toLocaleDateString("en-GB", {
        day: "numeric",
        month: "short",
        year: "numeric"
      });

      ctx.font = "36px Arial";
      ctx.fillStyle = "#ffffff";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      ctx.shadowColor = "rgba(0,0,0,0.35)";
      ctx.shadowBlur = 4;
      ctx.shadowOffsetX = 2;
      ctx.shadowOffsetY = 2;

      const x = canvas.width / 2;
      const y = canvas.height * 0.93;

      ctx.fillText(dateString, x, y);

      ctx.shadowColor = "transparent";
      ctx.shadowBlur = 0;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = 0;
    }

    function generateCertificate() {
      if (!imageLoaded) {
        status.textContent = "Still loading certificate image…";
        return;
      }

      const name = nameInput.value.trim();
      if (!name) {
        status.textContent = "Enter your name first.";
        return;
      }

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(certImage, 0, 0);

      drawName(name);
      drawDate();

      hasGenerated = true;
      downloadBtn.disabled = false;
      status.textContent = "Certificate generated. Ready to download.";
    }

    function downloadCertificate() {
      if (!hasGenerated) {
        status.textContent = "Generate the certificate first.";
        return;
      }

      const link = document.createElement("a");
      link.download = "WRW_Rattlesnake_10K_Certificate.png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    }

    generateBtn.addEventListener("click", generateCertificate);
    downloadBtn.addEventListener("click", downloadCertificate);
  </script>

</body>
</html>
