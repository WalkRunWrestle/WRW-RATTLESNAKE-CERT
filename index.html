<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>THE RATTLESNAKE 10K CERTIFICATE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      background: #111;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
    }

    h1 {
      margin: 10px 0 18px;
      font-size: 44px;
      line-height: 1.05;
      letter-spacing: 1px;
      font-weight: 900;
      text-transform: uppercase;
    }

    input, button {
      padding: 14px;
      font-size: 18px;
      margin: 8px 6px;
      border-radius: 10px;
      border: none;
      width: min(560px, 92vw);
      max-width: 92vw;
      box-sizing: border-box;
    }

    input{
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btnRow{
      display: grid;
      gap: 10px;
      justify-content: center;
      margin-top: 6px;
    }

    button {
      background: #f39c12;
      font-weight: 900;
      cursor: pointer;
      width: min(560px, 92vw);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    canvas {
      margin-top: 18px;
      border: 3px solid #f39c12;
      max-width: 100%;
      height: auto;
      background: #222;
      border-radius: 6px;
    }

    #status {
      margin-top: 12px;
      font-size: 14px;
      opacity: 0.9;
    }
  </style>
</head>

<body>

  <h1>THE<br>RATTLESNAKE 10K<br>CERTIFICATE</h1>

  <input id="nameInput" type="text" placeholder="ENTER YOUR NAME" />

  <div class="btnRow">
    <button id="generateBtn">Generate Certificate</button>
    <button id="downloadBtn" disabled>Download Certificate</button>
  </div>

  <div id="status">Loading certificate image…</div>

  <canvas id="canvas"></canvas>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const nameInput = document.getElementById("nameInput");
    const generateBtn = document.getElementById("generateBtn");
    const downloadBtn = document.getElementById("downloadBtn");
    const status = document.getElementById("status");

    const certImage = new Image();
    certImage.src = "certificate.png"; // MUST match filename in repo

    let imageLoaded = false;
    let hasGenerated = false;

    // Collapse spaces + uppercase as they type
    nameInput.addEventListener("input", () => {
      nameInput.value = nameInput.value
        .toUpperCase()
        .replace(/\s+/g, " "); // collapse multiple spaces
    });

    // Enter to generate (phone-friendly)
    nameInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        generateCertificate();
      }
    });

    certImage.onload = () => {
      imageLoaded = true;
      canvas.width = certImage.naturalWidth;
      canvas.height = certImage.naturalHeight;
      ctx.drawImage(certImage, 0, 0);
      status.textContent = "Ready. Enter your name and press Generate.";
    };

    certImage.onerror = () => {
      status.textContent = "ERROR: certificate.png failed to load.";
    };

    function clearAndRedrawBase(){
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(certImage, 0, 0);
    }

    // Fit text into a max width by shrinking font size
    function fitFontSize(text, maxWidth, startPx, minPx){
      let size = startPx;
      while (size > minPx){
        ctx.font = `900 ${size}px Impact, Arial Black, Arial, sans-serif`;
        const w = ctx.measureText(text).width;
        if (w <= maxWidth) return size;
        size -= 2;
      }
      return minPx;
    }

    function sanitizeName(raw){
      return String(raw || "")
        .trim()
        .replace(/\s+/g, " ")
        .toUpperCase();
    }

    function drawName(name) {
      const upperName = sanitizeName(name);

      // --- NAME AREA TUNING ---
      // Keep it inside the "AWARDED TO" band area
      const x = canvas.width / 2;
      const y = canvas.height * 0.655;              // moved slightly UP vs your broken one
      const maxWidth = canvas.width * 0.66;         // safe width inside bars

      // Start size based on canvas width, but clamp it
      const startSize = Math.round(canvas.width * 0.11); // strong but not stupid
      const minSize = 46;

      const finalSize = fitFontSize(upperName, maxWidth, startSize, minSize);

      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      // Shadow (subtle)
      ctx.shadowColor = "rgba(0,0,0,0.55)";
      ctx.shadowBlur = 10;
      ctx.shadowOffsetX = 2;
      ctx.shadowOffsetY = 3;

      // Outline then fill (cleaner on smoke)
      ctx.font = `900 ${finalSize}px Impact, Arial Black, Arial, sans-serif`;
      ctx.lineWidth = Math.max(6, Math.round(finalSize * 0.09));
      ctx.strokeStyle = "rgba(0,0,0,0.85)";
      ctx.strokeText(upperName, x, y);

      ctx.fillStyle = "#F5F5F5";
      ctx.fillText(upperName, x, y);

      // Reset shadow
      ctx.shadowColor = "transparent";
      ctx.shadowBlur = 0;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = 0;
    }

    function drawDate() {
      const today = new Date();
      const dateString = today.toLocaleDateString("en-GB", {
        day: "numeric",
        month: "short",
        year: "numeric"
      });

      const x = canvas.width / 2;
      const y = canvas.height * 0.92;

      const size = Math.max(28, Math.round(canvas.width * 0.032));
      ctx.font = `800 ${size}px Arial, sans-serif`;
      ctx.fillStyle = "#FFFFFF";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      ctx.shadowColor = "rgba(0,0,0,0.45)";
      ctx.shadowBlur = 6;
      ctx.shadowOffsetX = 2;
      ctx.shadowOffsetY = 2;

      ctx.lineWidth = 4;
      ctx.strokeStyle = "rgba(0,0,0,0.75)";
      ctx.strokeText(dateString, x, y);
      ctx.fillText(dateString, x, y);

      ctx.shadowColor = "transparent";
    }

    function generateCertificate() {
      if (!imageLoaded) {
        status.textContent = "Still loading certificate image…";
        return;
      }

      const name = sanitizeName(nameInput.value);
      if (!name) {
        status.textContent = "Enter your name first.";
        return;
      }

      clearAndRedrawBase();
      drawName(name);
      drawDate();

      hasGenerated = true;
      downloadBtn.disabled = false;
      status.textContent = "Certificate generated. Ready to download.";
    }

    function downloadCertificate() {
      if (!hasGenerated) {
        status.textContent = "Generate the certificate first.";
        return;
      }

      const link = document.createElement("a");
      link.download = "WRW_RATTLESNAKE_10K_CERTIFICATE.png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    }

    generateBtn.addEventListener("click", generateCertificate);
    downloadBtn.addEventListener("click", downloadCertificate);
  </script>

</body>
</html>
