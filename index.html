<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>THE RATTLESNAKE 10K CERTIFICATE</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<style>
body {
  background:#111;
  color:#fff;
  font-family:Arial, sans-serif;
  text-align:center;
  padding:20px;
}

h1{
  font-size:34px;
  font-weight:900;
  letter-spacing:2px;
  text-transform:uppercase;
  margin-bottom:20px;
}

input{
  padding:14px;
  font-size:18px;
  width:90%;
  max-width:420px;
  border-radius:10px;
  border:none;
  margin-bottom:14px;
}

button{
  width:90%;
  max-width:420px;
  padding:16px;
  font-size:18px;
  font-weight:900;
  border-radius:12px;
  border:none;
  margin:8px 0;
  cursor:pointer;
  background:#f39c12;
  color:#000;
}

button:disabled{
  opacity:.5;
  cursor:not-allowed;
}

canvas{
  margin-top:20px;
  border:4px solid #f39c12;
  border-radius:14px;
  max-width:100%;
  height:auto;
  background:#222;
}

#status{
  margin-top:12px;
  font-size:14px;
  opacity:.85;
}
</style>
</head>

<body>

<h1>THE RATTLESNAKE 10K CERTIFICATE</h1>

<input id="nameInput" type="text" placeholder="Enter your name" />

<button id="generateBtn">Generate Certificate</button>
<button id="downloadBtn" disabled>Download Certificate</button>

<div id="status">Loading certificate image…</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const nameInput = document.getElementById("nameInput");
const generateBtn = document.getElementById("generateBtn");
const downloadBtn = document.getElementById("downloadBtn");
const status = document.getElementById("status");

const certImage = new Image();
certImage.src = "certificate.png";

let imageLoaded = false;
let hasGenerated = false;

certImage.onload = () => {
  imageLoaded = true;
  canvas.width = certImage.naturalWidth;
  canvas.height = certImage.naturalHeight;
  ctx.drawImage(certImage, 0, 0);
  status.textContent = "Ready. Enter your name and press Generate.";
};

certImage.onerror = () => {
  status.textContent = "ERROR: certificate.png failed to load.";
};

/* NAME */
function drawName(name){
  const upperName = name.toUpperCase();
  const x = canvas.width / 2;

  // ✅ slight DOWN
  const y = canvas.height * 0.632;

  let fontSize = Math.round(canvas.width * 0.08);
  ctx.font = `900 ${fontSize}px Arial`;

  while(ctx.measureText(upperName).width > canvas.width * 0.75){
    fontSize -= 2;
    ctx.font = `900 ${fontSize}px Arial`;
  }

  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  ctx.shadowColor = "rgba(0,0,0,0.6)";
  ctx.shadowBlur = 8;
  ctx.shadowOffsetX = 3;
  ctx.shadowOffsetY = 3;

  ctx.fillStyle = "#ffffff";
  ctx.fillText(upperName, x, y);

  ctx.shadowColor = "transparent";
}

/* DATE */
function drawDate(){
  const today = new Date();
  const dateString = today.toLocaleDateString("en-GB",{
    day:"2-digit",
    month:"short",
    year:"numeric"
  });

  const x = canvas.width / 2;

  // ✅ slight UP
  const y = canvas.height * 0.928;

  const fontSize = Math.max(18, Math.round(canvas.width * 0.020));
  ctx.font = `700 ${fontSize}px Arial`;

  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  ctx.shadowColor = "rgba(0,0,0,0.4)";
  ctx.shadowBlur = 5;
  ctx.shadowOffsetX = 2;
  ctx.shadowOffsetY = 2;

  ctx.fillStyle = "#ffffff";
  ctx.fillText(dateString, x, y);

  ctx.shadowColor = "transparent";
}

function generateCertificate(){
  if(!imageLoaded){
    status.textContent = "Still loading certificate image…";
    return;
  }

  const name = nameInput.value.trim();
  if(!name){
    status.textContent = "Enter your name first.";
    return;
  }

  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(certImage,0,0);

  drawName(name);
  drawDate();

  hasGenerated = true;
  downloadBtn.disabled = false;
  status.textContent = "Certificate generated. Ready to download.";
}

function downloadCertificate(){
  if(!hasGenerated){
    status.textContent = "Generate the certificate first.";
    return;
  }

  const link = document.createElement("a");
  link.download = "THE_RATTLESNAKE_10K_CERTIFICATE.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
}

generateBtn.addEventListener("click", generateCertificate);
downloadBtn.addEventListener("click", downloadCertificate);
</script>

</body>
</html>
