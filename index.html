<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>WRW THE RATTLESNAKE 10K Certificate</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Better, consistent fonts on phones -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Anton = bold/condensed for the NAME, Inter = clean UI text -->
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    body {
      background: #111;
      color: #fff;
      font-family: Inter, Arial, sans-serif;
      text-align: center;
      padding: 20px;
    }

    h1 {
      margin-bottom: 15px;
      letter-spacing: 1.2px;
      text-transform: uppercase; /* keep it in caps */
      font-weight: 900;
    }

    input, button {
      padding: 12px;
      font-size: 18px;
      margin: 6px;
      border-radius: 10px;
      border: none;
      width: min(520px, 92vw);
      box-sizing: border-box;
    }

    input {
      outline: none;
    }

    button {
      background: #f39c12;
      font-weight: 900;
      cursor: pointer;
      width: min(520px, 92vw);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    canvas {
      margin-top: 20px;
      border: 3px solid #f39c12;
      max-width: 100%;
      height: auto;
      background: #222;
      border-radius: 10px;
    }

    #status {
      margin-top: 12px;
      font-size: 14px;
      opacity: 0.9;
    }

    .btnRow {
      display: grid;
      gap: 10px;
      justify-content: center;
      margin-top: 6px;
    }

    @media (min-width: 600px){
      .btnRow {
        grid-template-columns: 1fr 1fr;
        width: min(520px, 92vw);
        margin-left: auto;
        margin-right: auto;
      }
      .btnRow button { width: 100%; }
      input { width: min(520px, 92vw); }
    }
  </style>
</head>

<body>

  <!-- CHANGED: Rattler -> THE RATTLESNAKE 10K (caps) -->
  <h1>THE RATTLESNAKE 10K CERTIFICATE</h1>

  <input id="nameInput" type="text" placeholder="Enter your name" autocomplete="name" />

  <div class="btnRow">
    <button id="generateBtn">Generate Certificate</button>
    <button id="downloadBtn" disabled>Download Certificate</button>
  </div>

  <div id="status">Loading certificate image…</div>

  <canvas id="canvas"></canvas>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const nameInput = document.getElementById("nameInput");
    const generateBtn = document.getElementById("generateBtn");
    const downloadBtn = document.getElementById("downloadBtn");
    const status = document.getElementById("status");

    const certImage = new Image();
    certImage.src = "certificate.png"; // MUST match filename in repo

    let imageLoaded = false;
    let fontsReady = false;
    let hasGenerated = false;

    // --- Helpers ---
    function clearAndRedrawBase(){
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(certImage, 0, 0);
    }

    function fitTextToWidth(text, maxWidth, startingPx, minPx, fontFamily, fontWeight = 400){
      let size = startingPx;
      while (size > minPx){
        ctx.font = `${fontWeight} ${size}px ${fontFamily}`;
        const w = ctx.measureText(text).width;
        if (w <= maxWidth) break;
        size -= 2;
      }
      return size;
    }

    function drawName(name) {
      const upperName = String(name).trim().toUpperCase();

      // Safe margins for long names
      const maxWidth = canvas.width * 0.78;

      // Anton is loaded from Google Fonts; fallback if it fails
      const family = `"Anton", "Impact", "Arial Black", Arial, sans-serif`;

      // Auto-fit size so long names don't run off the certificate
      const startSize = Math.round(canvas.width * 0.11); // scales with image size
      const minSize   = Math.round(canvas.width * 0.055);
      const fittedSize = fitTextToWidth(upperName, maxWidth, startSize, minSize, family, 400);

      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      // Fill + stroke = readable on any background
      ctx.font = `400 ${fittedSize}px ${family}`;
      ctx.fillStyle = "#F5F5F5";

      ctx.shadowColor = "rgba(0,0,0,0.45)";
      ctx.shadowBlur = 8;
      ctx.shadowOffsetX = 3;
      ctx.shadowOffsetY = 3;

      const x = canvas.width / 2;
      const y = canvas.height * 0.67; // under AWARDED TO (same as before)

      // Outline for extra clarity
      ctx.lineWidth = Math.max(4, Math.round(fittedSize * 0.08));
      ctx.strokeStyle = "rgba(0,0,0,0.55)";
      ctx.strokeText(upperName, x, y);
      ctx.fillText(upperName, x, y);

      // Reset shadow
      ctx.shadowColor = "transparent";
      ctx.shadowBlur = 0;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = 0;
    }

    function drawDate() {
      const today = new Date();
      const dateString = today.toLocaleDateString("en-GB", {
        day: "numeric",
        month: "short",
        year: "numeric"
      });

      // Scales a bit for different image sizes
      const size = Math.max(28, Math.round(canvas.width * 0.033));

      ctx.font = `700 ${size}px "Inter", Arial, sans-serif`;
      ctx.fillStyle = "#FFFFFF";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      ctx.shadowColor = "rgba(0,0,0,0.35)";
      ctx.shadowBlur = 5;
      ctx.shadowOffsetX = 2;
      ctx.shadowOffsetY = 2;

      const x = canvas.width / 2;
      const y = canvas.height * 0.93; // under 10 KILOMETERS

      // Outline for clarity
      ctx.lineWidth = Math.max(3, Math.round(size * 0.09));
      ctx.strokeStyle = "rgba(0,0,0,0.45)";
      ctx.strokeText(dateString, x, y);
      ctx.fillText(dateString, x, y);

      ctx.shadowColor = "transparent";
      ctx.shadowBlur = 0;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = 0;
    }

    async function ensureFontsReady(){
      // Wait for web fonts so canvas uses them properly (mobile-friendly)
      try{
        if (document.fonts && document.fonts.ready){
          await document.fonts.ready;
        }
      }catch(e){}
      fontsReady = true;
    }

    // --- Image load ---
    certImage.onload = async () => {
      imageLoaded = true;
      canvas.width = certImage.naturalWidth;
      canvas.height = certImage.naturalHeight;

      await ensureFontsReady();

      clearAndRedrawBase();
      status.textContent = "Ready. Enter your name and press Generate.";
    };

    certImage.onerror = () => {
      status.textContent = "ERROR: certificate.png failed to load.";
    };

    function generateCertificate() {
      if (!imageLoaded) {
        status.textContent = "Still loading certificate image…";
        return;
      }
      if (!fontsReady) {
        status.textContent = "Loading fonts… try again in a second.";
        return;
      }

      const name = nameInput.value.trim();
      if (!name) {
        status.textContent = "Enter your name first.";
        return;
      }

      clearAndRedrawBase();
      drawName(name);
      drawDate();

      hasGenerated = true;
      downloadBtn.disabled = false;
      status.textContent = "Certificate generated. Ready to download.";
    }

    function downloadCertificate() {
      if (!hasGenerated) {
        status.textContent = "Generate the certificate first.";
        return;
      }

      const link = document.createElement("a");
      // CHANGED: filename reflects Rattlesnake 10K
      link.download = "WRW_RATTLESNAKE_10K_CERTIFICATE.png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    }

    generateBtn.addEventListener("click", generateCertificate);
    downloadBtn.addEventListener("click", downloadCertificate);

    // Mobile UX: press Enter to generate
    nameInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        generateCertificate();
      }
    });

    // Bonus: auto-uppercase as they type (matches WRW vibe)
    nameInput.addEventListener("input", () => {
      const pos = nameInput.selectionStart;
      nameInput.value = nameInput.value.toUpperCase();
      try { nameInput.setSelectionRange(pos, pos); } catch(e){}
    });
  </script>

</body>
</html>
